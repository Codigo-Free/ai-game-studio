name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Runtime & CLI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install audio system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Compile benchmarks
        if: matrix.os == 'ubuntu-latest'
        run: cargo bench --workspace --no-run
      - name: Validate example projects
        run: |
          cargo run -p aigs-cli -- validate examples/hello-world/game.aigs
          cargo run -p aigs-cli -- validate examples/robot-rescue/game.aigs

  web-player:
    name: Web player (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install audio system dependencies (needed to build aigs-cli natively below)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: exporters/web-player
      - name: Lint
        working-directory: exporters/web-player
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
      - name: Build
        working-directory: exporters/web-player
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli (pinned to the crate version in use)
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - name: Post-process with wasm-bindgen
        run: |
          wasm-bindgen --target web --out-dir /tmp/web-player --out-name aigs_web_player \
            exporters/web-player/target/wasm32-unknown-unknown/release/aigs_web_player.wasm
      - name: Export every example project to Web and check the layout
        run: |
          mkdir -p /tmp/aigs-cli-web-player/web-player
          cp /tmp/web-player/aigs_web_player.js /tmp/web-player/aigs_web_player_bg.wasm \
            /tmp/aigs-cli-web-player/web-player/
          cargo build -p aigs-cli
          cp target/debug/aigs /tmp/aigs-cli-web-player/aigs
          for manifest in examples/*/game.aigs; do
            name=$(basename "$(dirname "$manifest")")
            echo "::group::Exporting $name to Web"
            /tmp/aigs-cli-web-player/aigs export "$manifest" \
              --target web --output "/tmp/web-dist/$name"
            test -f "/tmp/web-dist/$name/$name/index.html"
            test -f "/tmp/web-dist/$name/$name/aigs_web_player_bg.wasm"
            test -f "/tmp/web-dist/$name/$name/data/game.aigs"
            echo "::endgroup::"
          done

  android-player:
    name: Android player (aarch64)
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: r28c
    steps:
      - uses: actions/checkout@v4
      - name: Install audio system dependencies (needed to build aigs-cli natively below)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: exporters/android-player
      - name: Install Android NDK
        run: |
          curl -sSL -o ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip"
          unzip -q ndk.zip -d "$HOME"
          rm ndk.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
      - name: Install Android SDK (cmdline-tools, platform-tools, build-tools, platform 34)
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          mkdir -p "$HOME/android-sdk/cmdline-tools"
          curl -sSL -o tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q tools.zip -d "$HOME/android-sdk/cmdline-tools"
          mv "$HOME/android-sdk/cmdline-tools/cmdline-tools" "$HOME/android-sdk/cmdline-tools/latest"
          rm tools.zip
          yes | "$HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$HOME/android-sdk" \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null
      - name: Install cargo-apk (pinned)
        run: cargo install cargo-apk --version 0.10.0 --locked
      - name: Lint
        working-directory: exporters/android-player
        run: cargo clippy --target aarch64-linux-android -- -D warnings
      - name: Build the player template (debug, self-signed debug keystore)
        working-directory: exporters/android-player
        run: cargo apk build
      - name: Export an example project to Android and check the APK
        run: |
          rm -rf exporters/android-player/target
          mkdir -p /tmp/aigs-cli-android
          # Symlinked (not copied): the template's Cargo.toml depends on
          # aigs-project/aigs-runtime by a path relative to itself, and
          # aigs-export-android resolves that path through this location —
          # a symlink keeps it pointing at the real runtime/crates checkout
          # (see fix_path_dependencies in exporters/android/src/lib.rs).
          ln -s "$(pwd)/exporters/android-player" /tmp/aigs-cli-android/android-player-template
          cargo build -p aigs-cli
          cp target/debug/aigs /tmp/aigs-cli-android/aigs
          /tmp/aigs-cli-android/aigs export examples/robot-rescue/game.aigs \
            --target android --output /tmp/android-dist
          apk=/tmp/android-dist/robot-rescue-android/target/debug/apk/robot-rescue.apk
          test -f "$apk"
          "$HOME/android-sdk/build-tools/34.0.0/aapt" dump badging "$apk" | grep -q "native-code: 'arm64-v8a'"

  editor-frontend:
    name: Editor frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - run: npm ci
      - run: npm run build

  editor-tauri:
    name: Editor shell (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: editor/src-tauri
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - name: Build frontend (required by tauri build script)
        working-directory: editor
        run: npm ci && npm run build
      - name: Check Tauri shell
        working-directory: editor/src-tauri
        run: cargo check --locked || cargo check
