name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Runtime & CLI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install audio system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Compile benchmarks
        if: matrix.os == 'ubuntu-latest'
        run: cargo bench --workspace --no-run
      - name: Validate example projects
        run: |
          cargo run -p aigs-cli -- validate examples/hello-world/game.aigs
          cargo run -p aigs-cli -- validate examples/robot-rescue/game.aigs

  web-player:
    name: Web player (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install audio system dependencies (needed to build aigs-cli natively below)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: exporters/web-player
      - name: Lint
        working-directory: exporters/web-player
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
      - name: Build
        working-directory: exporters/web-player
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli (pinned to the crate version in use)
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - name: Post-process with wasm-bindgen
        run: |
          wasm-bindgen --target web --out-dir /tmp/web-player --out-name aigs_web_player \
            exporters/web-player/target/wasm32-unknown-unknown/release/aigs_web_player.wasm
      - name: Export an example project to Web and check the layout
        run: |
          mkdir -p /tmp/aigs-cli-web-player/web-player
          cp /tmp/web-player/aigs_web_player.js /tmp/web-player/aigs_web_player_bg.wasm \
            /tmp/aigs-cli-web-player/web-player/
          cargo build -p aigs-cli
          cp target/debug/aigs /tmp/aigs-cli-web-player/aigs
          /tmp/aigs-cli-web-player/aigs export examples/robot-rescue/game.aigs \
            --target web --output /tmp/web-dist
          test -f /tmp/web-dist/robot-rescue/index.html
          test -f /tmp/web-dist/robot-rescue/aigs_web_player_bg.wasm
          test -f /tmp/web-dist/robot-rescue/data/game.aigs

  editor-frontend:
    name: Editor frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - run: npm ci
      - run: npm run build

  editor-tauri:
    name: Editor shell (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: editor/src-tauri
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - name: Build frontend (required by tauri build script)
        working-directory: editor
        run: npm ci && npm run build
      - name: Check Tauri shell
        working-directory: editor/src-tauri
        run: cargo check --locked || cargo check
